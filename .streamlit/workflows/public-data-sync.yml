name: EVENTIX EKAP and Economy Sync

on:
  schedule:
    # Türkiye saatiyle her gün 12:00. İstanbul yıl boyunca UTC+3'tür.
    - cron: "0 9 * * *"
    # Canlı ekonomi paneli için 15 dakikada bir.
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync-public-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Repository checkout
        uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: automation/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r automation/requirements.txt

      - name: Select sync mode
        id: mode
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=all" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 9 * * *" ]; then
            echo "value=all" >> "$GITHUB_OUTPUT"
          else
            echo "value=economy" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync authorized feeds to Firestore
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          EKAP_FEED_URL: ${{ secrets.EKAP_FEED_URL }}
          EKAP_FEED_TOKEN: ${{ secrets.EKAP_FEED_TOKEN }}
          EKAP_KEYWORDS: ${{ secrets.EKAP_KEYWORDS }}
          ECONOMY_FEED_URL: ${{ secrets.ECONOMY_FEED_URL }}
          ECONOMY_FEED_TOKEN: ${{ secrets.ECONOMY_FEED_TOKEN }}
        run: python automation/sync_public_data.py --mode "${{ steps.mode.outputs.value }}"
