name: EVENTIX Market Data Sync

on:
  schedule:
    # GitHub zamanlayıcısı verileri yaklaşık 5 dakikada bir kontrol eder.
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync-public-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Repository checkout
        uses: actions/checkout@v6

      - name: Python setup
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: automation/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r automation/requirements.txt

      - name: Sync Altinkaynak and Borsa Istanbul data to Firestore
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: python automation/sync_public_data.py
