name: EVENTIX Market Data Sync

on:
  schedule:
    # Bloomberg HT Borsa sayfası 15 dakikada bir kontrol edilir.
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync-public-data:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Repository checkout
        uses: actions/checkout@v6

      - name: Python setup
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: automation/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r automation/requirements.txt

      - name: Ensure headless browser is available
        shell: bash
        run: |
          if command -v google-chrome >/dev/null 2>&1 || command -v chromium >/dev/null 2>&1 || command -v chromium-browser >/dev/null 2>&1; then
            echo "Runner browser found."
          else
            python -m playwright install --with-deps chromium
          fi

      - name: Sync Altinkaynak and Bloomberg HT data to Firestore
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: python automation/sync_public_data.py
