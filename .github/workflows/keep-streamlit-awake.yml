name: Keep Streamlit Awake

on:
  schedule:
    # GitHub Actions cron saatleri UTC'dir. Her 6 saatte bir çalışır.
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: keep-streamlit-awake
  cancel-in-progress: true

jobs:
  visit-app:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check application URL
        env:
          APP_URL: ${{ secrets.STREAMLIT_APP_URL }}
        shell: bash
        run: |
          if [ -z "$APP_URL" ]; then
            echo "::error::STREAMLIT_APP_URL secret is not defined."
            exit 1
          fi

      - name: Visit Streamlit application
        env:
          APP_URL: ${{ secrets.STREAMLIT_APP_URL }}
        shell: bash
        run: |
          curl \
            --fail \
            --location \
            --retry 3 \
            --retry-all-errors \
            --connect-timeout 20 \
            --max-time 60 \
            --user-agent "Mozilla/5.0 (compatible; EVENTIX-Keep-Awake/1.0)" \
            --output /dev/null \
            --silent \
            --show-error \
            "$APP_URL"
