name: EVENTIX Economy Sync

on:
  schedule:
    # Ekonomi paneli için her 15 dakikada bir kontrol.
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync-public-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Repository checkout
        uses: actions/checkout@v6

      - name: Python setup
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: automation/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r automation/requirements.txt

      - name: Sync economy data to Firestore
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          ECONOMY_FEED_URL: ${{ secrets.ECONOMY_FEED_URL }}
          ECONOMY_FEED_TOKEN: ${{ secrets.ECONOMY_FEED_TOKEN }}
          ECONOMY_CURRENCY_CODES: ${{ vars.ECONOMY_CURRENCY_CODES }}
        run: python automation/sync_public_data.py
